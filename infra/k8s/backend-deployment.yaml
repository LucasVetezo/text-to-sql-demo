# =============================================================================
# Backend Deployment + Service — Kubernetes (AKS)
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: tsql-demo
  labels:
    app: text-to-sql-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsql-backend
  namespace: tsql-demo
  labels:
    app: text-to-sql-demo
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: text-to-sql-demo
      component: backend
  template:
    metadata:
      labels:
        app: text-to-sql-demo
        component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: yourregistry.azurecr.io/tsql-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: OPENAI_MODEL
              value: "gpt-4o"
            - name: MLFLOW_TRACKING_URI
              value: "http://tsql-mlflow:5000"
            - name: DB_URL
              value: "postgresql+asyncpg://nedbank:$(POSTGRES_PASSWORD)@tsql-postgres:5432/nedbankdb"
            - name: LANGSMITH_TRACING
              value: "true"
            - name: LANGSMITH_PROJECT
              value: "text-to-sql-demo-prod"
          envFrom:
            - secretRef:
                name: tsql-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # FastAPI writes temp files
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: tsql-backend
  namespace: tsql-demo
  labels:
    app: text-to-sql-demo
    component: backend
spec:
  selector:
    app: text-to-sql-demo
    component: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP    # Internal only — not exposed externally
