# =============================================================================
# Kubernetes Secrets Template — text-to-sql-demo
# =============================================================================
# ⚠️  IMPORTANT: This file contains TEMPLATE values only.
#    Real secrets are injected by the Azure DevOps pipeline from Azure Key Vault.
#    NEVER commit real base64-encoded secrets to git.
#
# To generate base64: echo -n "your-value" | base64
# To decode: echo "base64value" | base64 -d
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: tsql-secrets
  namespace: tsql-demo
  labels:
    app: text-to-sql-demo
type: Opaque
data:
  # Replace PLACEHOLDER_* with real base64-encoded values in the pipeline
  OPENAI_API_KEY: PLACEHOLDER_BASE64_OPENAI_KEY
  LANGSMITH_API_KEY: PLACEHOLDER_BASE64_LANGSMITH_KEY
  SECRET_KEY: PLACEHOLDER_BASE64_SECRET_KEY
  POSTGRES_PASSWORD: PLACEHOLDER_BASE64_POSTGRES_PASS
